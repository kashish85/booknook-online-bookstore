        }

        // Categories Component
        function Categories({ setActiveCategory, setCurrentPage, categories, loading }) {
            if (loading) {
                return (
                    <section className="categories">
                        <div className="container">
                            <h2 className="section-title">Browse Categories</h2>
                            <div className="categories-grid">
                                {[1,2,3,4,5,6].map(i => (
                                    <div key={i} className="category-card" style={{opacity: 0.5}}>
                                        <div className="loading" style={{margin: '0 auto'}}></div>
                                        <h3>Loading...</h3>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                );
            }

            return (
                <section className="categories">
                    <div className="container">
                        <h2 className="section-title">Browse Categories</h2>
                        <div className="categories-grid">
                            {categories.map(category => (
                                <div 
                                    key={category.id} 
                                    className="category-card"
                                    onClick={() => {
                                        setActiveCategory(category.name.toLowerCase());
                                        setCurrentPage('home');
                                    }}
                                >
                                    <i className={category.icon}></i>
                                    <h3>{category.name}</h3>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // Cart Component
        function Cart({ isOpen, toggleCart, cartItems, updateQuantity, removeFromCart, proceedToCheckout }) {
            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            return (
                <>
                    <div className={`overlay ${isOpen ? 'show' : ''}`} onClick={toggleCart}></div>
                    <div className={`modal cart-modal ${isOpen ? 'open' : ''}`}>
                        <div className="modal-header">
                            <h2>Your Cart ({cartItems.length})</h2>
                            <button className="close-modal" onClick={toggleCart}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="modal-content">
                            {cartItems.length === 0 ? (
                                <div className="empty-state">
                                    <i className="fas fa-shopping-cart"></i>
                                    <p>Your cart is empty</p>
                                    <button className="btn" onClick={toggleCart} style={{marginTop: '1rem'}}>
                                        Continue Shopping
                                    </button>
                                </div>
                            ) : (
                                cartItems.map(item => (
                                    <div key={item.id} className="cart-item">
                                        <div className="cart-item-img">
                                            <img src={item.image} alt={item.title} />
                                        </div>
                                        <div className="cart-item-details">
                                            <h4 className="cart-item-title">{item.title}</h4>
                                            <p className="cart-item-price">₹{item.price} x {item.quantity}</p>
                                            <div className="quantity-controls">
                                                <button 
                                                    className="quantity-btn"
                                                    onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                    disabled={item.quantity <= 1}
                                                >
                                                    <i className="fas fa-minus"></i>
                                                </button>
                                                <span className="quantity">{item.quantity}</span>
                                                <button 
                                                    className="quantity-btn"
                                                    onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                >
                                                    <i className="fas fa-plus"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <button 
                                            className="item-remove"
                                            onClick={() => removeFromCart(item.id)}
                                        >
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                        {cartItems.length > 0 && (
                            <div className="modal-footer">
                                <div className="cart-total">
                                    <span>Total:</span>
                                    <span>₹{total}</span>
                                </div>
                                <button 
                                    className="checkout-btn" 
                                    onClick={proceedToCheckout}
                                >
                                    Proceed to Checkout
                                </button>
                            </div>
                        )}
                    </div>
                </>
            );
        }

        // Wishlist Component
        function Wishlist({ isOpen, toggleWishlist, wishlistItems, removeFromWishlist, addToCart, showToast }) {
            const handleAddToCartFromWishlist = (book) => {
                addToCart(book);
                showToast(`${book.title} added to cart from wishlist!`, 'success');
            };

            return (
                <>
                    <div className={`overlay ${isOpen ? 'show' : ''}`} onClick={toggleWishlist}></div>
                    <div className={`modal cart-modal ${isOpen ? 'open' : ''}`}>
                        <div className="modal-header">
                            <h2>Your Wishlist ({wishlistItems.length})</h2>
                            <button className="close-modal" onClick={toggleWishlist}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="modal-content">
                            {wishlistItems.length === 0 ? (
                                <div className="empty-state">
                                    <i className="fas fa-heart"></i>
                                    <p>Your wishlist is empty</p>
                                    <button className="btn" onClick={toggleWishlist} style={{marginTop: '1rem'}}>
                                        Browse Books
                                    </button>
                                </div>
                            ) : (
                                wishlistItems.map(item => (
                                    <div key={item.id} className="wishlist-item">
                                        <div className="wishlist-item-img">
                                            <img src={item.image} alt={item.title} />
                                        </div>
                                        <div className="wishlist-item-details">
                                            <h4 className="wishlist-item-title">{item.title}</h4>
                                            <p className="wishlist-item-price">₹{item.price}</p>
                                            <button 
                                                className="add-to-cart"
                                                onClick={() => handleAddToCartFromWishlist(item)}
                                            >
                                                Add to Cart
                                            </button>
                                        </div>
                                        <button 
                                            className="item-remove"
                                            onClick={() => removeFromWishlist(item.id)}
                                        >
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </>
            );
        }

        // Payment Component
        function Payment({ isOpen, togglePayment, cartItems, processPayment, showToast }) {
            const [selectedMethod, setSelectedMethod] = useState(1);
            const [cardNumber, setCardNumber] = useState('');
            const [cardName, setCardName] = useState('');
            const [expiry, setExpiry] = useState('');
            const [cvv, setCvv] = useState('');
            const [upiId, setUpiId] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handlePayment = (e) => {
                e.preventDefault();
                if (isProcessing) return;

                // Basic validation
                if (selectedMethod <= 2) {
                    if (!cardNumber || !cardName || !expiry || !cvv) {
                        showToast('Please fill all card details', 'error');
                        return;
                    }
                } else if (selectedMethod === 3) {
                    if (!upiId || !upiId.includes('@')) {
                        showToast('Please enter a valid UPI ID', 'error');
                        return;
                    }
                }

                setIsProcessing(true);
                
                // Simulate payment processing
                setTimeout(() => {
                    setIsProcessing(false);
                    processPayment();
                }, 2000);
            };

            if (!isOpen) return null;

            return (
                <>
                    <div className="overlay show" onClick={togglePayment}></div>
                    <div className="payment-modal open">
                        <div className="payment-header">
                            <h2>Complete Your Purchase</h2>
                            <button className="close-modal" onClick={togglePayment}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <form onSubmit={handlePayment}>
                            <div className="payment-body">
                                <div className="cart-total" style={{marginBottom: '1.5rem'}}>
                                    <span>Order Total:</span>
                                    <span>₹{total}</span>
                                </div>
                                
                                <h3 style={{marginBottom: '1rem'}}>Select Payment Method</h3>
                                <div className="payment-methods">
                                    {paymentMethods.map(method => (
                                        <div 
                                            key={method.id}
                                            className={`payment-method ${selectedMethod === method.id ? 'selected' : ''}`}
                                            onClick={() => setSelectedMethod(method.id)}
                                        >
                                            <i className={method.icon}></i>
                                            <div>{method.name}</div>
                                        </div>
                                    ))}
                                </div>

                                {selectedMethod <= 2 && (
                                    <div>
                                        <div className="form-group">
                                            <label>Card Number</label>
                                            <input 
                                                type="text" 
                                                placeholder="1234 5678 9012 3456"
                                                value={cardNumber}
                                                onChange={(e) => setCardNumber(e.target.value)}
                                                maxLength="16"
                                                required
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>Cardholder Name</label>
                                            <input 
                                                type="text" 
                                                placeholder="John Doe"
                                                value={cardName}
                                                onChange={(e) => setCardName(e.target.value)}
                                                required
                                            />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label>Expiry Date</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="MM/YY"
                                                    value={expiry}
                                                    onChange={(e) => setExpiry(e.target.value)}
                                                    maxLength="5"
                                                    required
                                                />
                                            </div>
                                            <div className="form-group">
                                                <label>CVV</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="123"
                                                    value={cvv}
                                                    onChange={(e) => setCvv(e.target.value)}
                                                    maxLength="3"
                                                    required
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {selectedMethod === 3 && (
                                    <div className="form-group">
                                        <label>UPI ID</label>
                                        <input 
                                            type="text" 
                                            placeholder="yourname@upi"
                                            value={upiId}
                                            onChange={(e) => setUpiId(e.target.value)}
                                            required
                                        />
                                    </div>
                                )}

                                {selectedMethod === 4 && (
                                    <div className="form-group">
                                        <label>Select Bank</label>
                                        <select required>
                                            <option value="">Select your bank</option>
                                            <option>State Bank of India</option>
                                            <option>HDFC Bank</option>
                                            <option>ICICI Bank</option>
                                            <option>Axis Bank</option>
                                        </select>
                                    </div>
                                )}
                            </div>
                            <div className="payment-footer">
                                <button type="button" className="btn btn-outline" onClick={togglePayment}>
                                    Cancel
                                </button>
                                <button 
                                    type="submit"
                                    className="btn checkout-btn" 
                                    disabled={isProcessing}
                                >
                                    {isProcessing ? (
                                        <>
                                            <div className="loading"></div>
                                            Processing...
                                        </>
                                    ) : (
                                        `Pay ₹${total}`
                                    )}
                                </button>
                            </div>
                        </form>
                    </div>
                </>
            );
        }

        // Order Success Component
        function OrderSuccess({ isOpen, orderDetails, toggleSuccess }) {
            if (!isOpen) return null;

            return (
                <>
                    <div className="overlay show" onClick={toggleSuccess}></div>
                    <div className="payment-modal open">
                        <div className="order-success">
                            <i className="fas fa-check-circle"></i>
                            <h3>Order Placed Successfully!</h3>
                            <p>Thank you for your purchase. Your order has been confirmed.</p>
                            <p><strong>Order ID:</strong> #{orderDetails.id}</p>
                            <p><strong>Total Amount:</strong> ₹{orderDetails.total}</p>
                            <p>You will receive a confirmation email shortly.</p>
                            <button className="btn" onClick={toggleSuccess} style={{marginTop: '1rem'}}>
                                Continue Shopping
                            </button>
                        </div>
                    </div>
                </>
            );
        }

        // Newsletter Component
        function Newsletter() {
            const [email, setEmail] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (email) {
                    alert(`Thank you for subscribing with: ${email}`);
                    setEmail('');
                }
            };

            return (
                <section className="newsletter">
                    <div className="container">
                        <h2>Subscribe to Our Newsletter</h2>
                        <p>Stay updated with our latest book releases, promotions, and literary events.</p>
                        <form className="newsletter-form" onSubmit={handleSubmit}>
                            <input 
                                type="email" 
                                placeholder="Your email address" 
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required 
                            />
                            <button type="submit">Subscribe</button>
                        </form>
                    </div>
                </section>
            );
        }

        // Footer Component
        function Footer({ setCurrentPage }) {
            return (
                <footer>
                    <div className="container">
                        <div className="footer-content">
                            <div className="footer-column">
                                <h3>BookNook</h3>
                                <p>Your premier destination for books of all genres. We're passionate about connecting readers with their next great read.</p>
                                <div className="social-links">
                                    <a onClick={() => alert('Facebook page would open')}><i className="fab fa-facebook-f"></i></a>
                                    <a onClick={() => alert('Twitter page would open')}><i className="fab fa-twitter"></i></a>
                                    <a onClick={() => alert('Instagram page would open')}><i className="fab fa-instagram"></i></a>
                                    <a onClick={() => alert('Pinterest page would open')}><i className="fab fa-pinterest"></i></a>
                                </div>
                            </div>
                            <div className="footer-column">
                                <h3>Quick Links</h3>
                                <ul>
                                    <li><a onClick={() => setCurrentPage('home')}>Home</a></li>
                                    <li><a onClick={() => alert('Shop page')}>Shop</a></li>
                                    <li><a onClick={() => alert('Categories page')}>Categories</a></li>
                                    <li><a onClick={() => alert('Best Sellers page')}>Best Sellers</a></li>
                                    <li><a onClick={() => setCurrentPage('about')}>About Us</a></li>
                                </ul>
                            </div>
                            <div className="footer-column">
                                <h3>Customer Service</h3>
                                <ul>
                                    <li><a onClick={() => alert('Contact page')}>Contact Us</a></li>
                                    <li><a onClick={() => alert('Shipping policy')}>Shipping Policy</a></li>
                                    <li><a onClick={() => alert('Returns policy')}>Returns & Refunds</a></li>
                                    <li><a onClick={() => alert('FAQ page')}>FAQ</a></li>
                                    <li><a onClick={() => alert('My Account page')}>My Account</a></li>
                                </ul>
                            </div>
                            <div className="footer-column">
                                <h3>Contact Info</h3>
                                <ul>
                                    <li><i className="fas fa-map-marker-alt"></i> 123 Book Street, Mumbai, India</li>
                                    <li><i className="fas fa-phone"></i> +91 (555) 123-4567</li>
                                    <li><i className="fas fa-envelope"></i> info@booknook.in</li>
                                </ul>
                            </div>
                        </div>
                        <div className="copyright">
                            <p>&copy; 2023 BookNook. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        // Main App Component
        function App() {
            const [cartItems, setCartItems] = useState([]);
            const [wishlist, setWishlist] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isWishlistOpen, setIsWishlistOpen] = useState(false);
            const [isPaymentOpen, setIsPaymentOpen] = useState(false);
            const [isSuccessOpen, setIsSuccessOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState('all');
            const [currentPage, setCurrentPage] = useState('home');
            const [searchQuery, setSearchQuery] = useState('');
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [orderDetails, setOrderDetails] = useState({});
            const [books, setBooks] = useState([]);
            const [categories, setCategories] = useState([]);
            const [loading, setLoading] = useState(true);
            const [apiConnected, setApiConnected] = useState(false);

            // Load books and categories from GraphQL API
            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        const [booksData, categoriesData] = await Promise.all([
                            bookNookAPI.getAllBooks(),
                            bookNookAPI.getCategories()
                        ]);
                        setBooks(booksData);
                        setCategories(categoriesData);
                        setApiConnected(bookNookAPI.isConnected);
                    } catch (error) {
                        console.error('Error loading data:', error);
                        // Fallback to local data if API fails
                        setBooks(bookData);
                        setCategories(categories);
                        setApiConnected(false);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
            }, []);

            // Handle search with GraphQL
            const handleSearch = async (query) => {
                setSearchQuery(query);
                if (query.trim() === '') {
                    // If empty search, load all books
                    const allBooks = await bookNookAPI.getAllBooks();
                    setBooks(allBooks);
                    return;
                }

                try {
                    const searchResults = await bookNookAPI.searchBooks(query);
                    setBooks(searchResults);
                } catch (error) {
                    console.error('Search error:', error);
                    // Fallback to local search
                    const filteredBooks = bookData.filter(book => 
                        book.title.toLowerCase().includes(query.toLowerCase()) ||
                        book.author.toLowerCase().includes(query.toLowerCase()) ||
                        book.category.toLowerCase().includes(query.toLowerCase())
                    );
                    setBooks(filteredBooks);
                }
            };

            // Update addToCart to use GraphQL mutation
            const addToCart = async (book) => {
                try {
                    await bookNookAPI.addToCart(book.id, 1);
                    
                    // Update local state
                    setCartItems(prevItems => {
                        const existingItem = prevItems.find(item => item.id === book.id);
                        
                        if (existingItem) {
                            return prevItems.map(item =>
                                item.id === book.id
                                    ? { ...item, quantity: item.quantity + 1 }
                                    : item
                            );
                        } else {
                            return [...prevItems, { ...book, quantity: 1 }];
                        }
                    });
                    
                    showToast(`${book.title} added to cart!`, 'success');
                } catch (error) {
                    console.error('Error adding to cart:', error);
                    // Fallback to local state update
                    setCartItems(prevItems => {
                        const existingItem = prevItems.find(item => item.id === book.id);
                        
                        if (existingItem) {
                            return prevItems.map(item =>
                                item.id === book.id
                                    ? { ...item, quantity: item.quantity + 1 }
                                    : item
                            );
                        } else {
                            return [...prevItems, { ...book, quantity: 1 }];
                        }
                    });
                    showToast(`${book.title} added to cart!`, 'success');
                }
            };

            // Update quantity in cart
            const updateQuantity = (bookId, newQuantity) => {
                if (newQuantity < 1) {
                    removeFromCart(bookId);
                    return;
                }
                
                setCartItems(prevItems => 
                    prevItems.map(item =>
                        item.id === bookId
                            ? { ...item, quantity: newQuantity }
                            : item
                    )
                );
            };

            // Remove from cart
            const removeFromCart = (bookId) => {
                setCartItems(prevItems => prevItems.filter(item => item.id !== bookId));
            };

            // Wishlist functionality
            const addToWishlist = (book) => {
                setWishlist(prevItems => {
                    const existingItem = prevItems.find(item => item.id === book.id);
                    
                    if (existingItem) {
                        return prevItems.filter(item => item.id !== book.id);
                    } else {
                        return [...prevItems, book];
                    }
                });
            };

            const removeFromWishlist = (bookId) => {
                setWishlist(prevItems => prevItems.filter(item => item.id !== bookId));
            };

            // Proceed to checkout
            const proceedToCheckout = () => {
                if (cartItems.length === 0) {
                    showToast('Your cart is empty!', 'error');
                    return;
                }
                setIsCartOpen(false);
                setIsPaymentOpen(true);
            };

            // Process payment with GraphQL
            const processPayment = async () => {
                try {
                    const cartItemsForAPI = cartItems.map(item => ({
                        bookId: item.id,
                        quantity: item.quantity
                    }));

                    const order = await bookNookAPI.createOrder(cartItemsForAPI);
                    
                    setOrderDetails({
                        id: order.id,
                        total: order.total,
                        items: order.items.length,
                        date: new Date().toLocaleDateString()
                    });
                    
                    // Clear cart and close payment modal
                    setCartItems([]);
                    setIsPaymentOpen(false);
                    setIsSuccessOpen(true);
                    
                    showToast('Order placed successfully!', 'success');
                } catch (error) {
                    console.error('Payment error:', error);
                    // Fallback to local order processing
                    const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                    setOrderDetails({
                        id: `ORD${Date.now()}`,
                        total: total,
                        items: cartItems.length,
                        date: new Date().toLocaleDateString()
                    });
                    
                    setCartItems([]);
                    setIsPaymentOpen(false);
                    setIsSuccessOpen(true);
                    showToast('Order placed successfully!', 'success');
                }
            };

            // Show toast notification
            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast({ show: false, message: '', type: 'success' });
                }, 3000);
            };

            // Calculate counts
            const cartCount = cartItems.reduce((count, item) => count + item.quantity, 0);
            const wishlistCount = wishlist.length;

            return (
                <div className="App">
                    <ApiStatus isConnected={apiConnected} />
                    <Header 
                        cartCount={cartCount}
                        wishlistCount={wishlistCount}
                        toggleCart={() => setIsCartOpen(!isCartOpen)}
                        toggleWishlist={() => setIsWishlistOpen(!isWishlistOpen)}
                        setActiveCategory={setActiveCategory}
                        activeCategory={activeCategory}
                        setCurrentPage={setCurrentPage}
                        currentPage={currentPage}
                        setSearchQuery={handleSearch}
                    />
                    
                    {currentPage === 'about' ? (
                        <AboutPage isActive={currentPage === 'about'} />
                    ) : (
                        <>
                            <Hero setCurrentPage={setCurrentPage} />
                            <FeaturedBooks 
                                books={books} 
                                addToCart={addToCart}
                                addToWishlist={addToWishlist}
                                showToast={showToast}
                                activeCategory={activeCategory}
                                wishlist={wishlist}
                                searchQuery={searchQuery}
                                loading={loading}
                            />
                            <Categories 
                                setActiveCategory={setActiveCategory}
                                setCurrentPage={setCurrentPage}
                                categories={categories}
                                loading={loading}
                            />
                        </>
                    )}
                    
                    <Newsletter />
                    <Footer setCurrentPage={setCurrentPage} />
                    
                    <Cart 
                        isOpen={isCartOpen} 
                        toggleCart={() => setIsCartOpen(false)}
                        cartItems={cartItems}
                        updateQuantity={updateQuantity}
                        removeFromCart={removeFromCart}
                        proceedToCheckout={proceedToCheckout}
                    />
                    
                    <Wishlist 
                        isOpen={isWishlistOpen} 
                        toggleWishlist={() => setIsWishlistOpen(false)}
                        wishlistItems={wishlist}
                        removeFromWishlist={removeFromWishlist}
                        addToCart={addToCart}
                        showToast={showToast}
                    />
                    
                    <Payment 
                        isOpen={isPaymentOpen}
                        togglePayment={() => setIsPaymentOpen(false)}
                        cartItems={cartItems}
                        processPayment={processPayment}
                        showToast={showToast}
                    />
                    
                    <OrderSuccess 
                        isOpen={isSuccessOpen}
                        orderDetails={orderDetails}
                        toggleSuccess={() => setIsSuccessOpen(false)}
                    />
                    
                    <Toast 
                        message={toast.message} 
                        show={toast.show} 
                        type={toast.type} 
                    />
                </div>
            );
        }

        // Render the App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
